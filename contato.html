<!DOCTYPE html>
<html lang="pt-BR"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div style="padding: 10px; display: flex; gap: 10px; justify-content: flex-end;">
        <button id="btn-dark-mode">Ativar Modo Noturno</button>
        <button id="btn-aumentar-fonte">Aumentar Fonte </button>
        <button id="btn-diminuir-fonte">Diminuir Fonte </button>
    </div>

    <nav>
        <a href="index.html">Home</a> | 
        <a href="about.html">Sobre Mim</a> | 
        <a href="curriculo.html">Currículo</a> | 
        <a href="contato.html">Contato</a> | 
        <a href="receita.html">Receitas</a> </nav>

    <main style="max-width: 400px; margin: 20px auto; font-family: sans-serif;">
        <h2>Formulário de Contato</h2>
        
        <form id="form-contato">
            <div style="margin-bottom: 15px;">
                <label for="nome" style="display: block; margin-bottom: 5px; font-weight: bold;">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="email" style="display: block; margin-bottom: 5px; font-weight: bold;">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu-email@dominio.com" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <button type="submit" style="padding: 10px 15px; background-color: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer;">Enviar</button>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
